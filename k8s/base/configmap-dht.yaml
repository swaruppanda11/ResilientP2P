apiVersion: v1
kind: ConfigMap
metadata:
  name: p2p-common-config
  namespace: p2p-dht
data:
  INTRA_LOCATION_DELAY_MS: "5"
  INTER_LOCATION_DELAY_MS: "35"
  ORIGIN_DELAY_MS: "120"
  COORDINATOR_URL: "http://coordinator.p2p-dht.svc.cluster.local:8000"
  ORIGIN_URL: "http://origin.p2p-dht.svc.cluster.local:8001"
  DHT_BOOTSTRAP_HOST: "dht-bootstrap.p2p-dht.svc.cluster.local"
  DHT_BOOTSTRAP_PORT: "6000"
  DHT_PORT: "6000"
  PEER_PORT: "7000"
  DHT_LOOKUP_TIMEOUT_SECONDS: "0.5"
  DHT_REPUBLISH_INTERVAL_SECONDS: "300"
  PROVIDER_SELECTION_POLICY: "locality_then_load"
  HEARTBEAT_INTERVAL_SECONDS: "10"
  PEER_TIMEOUT_SECONDS: "30"
  MAX_PROVIDERS_PER_LOOKUP: "3"
  LOOKUP_TIMEOUT_SECONDS: "2.0"
  CACHE_CAPACITY_BYTES: "10485760"
  # Workstream 2: flip to "permissive" then "shared_token" after the auth
  # Secret is rolled out to every pod. AUTH_TOKEN comes from the Secret.
  AUTH_MODE: "none"
  # Workstream 3: feature-flagged. Off by default so baseline experiments
  # reproduce identically. Flip to "true" only when running malicious-peer
  # scenarios or validating WS3.
  REPUTATION_ENABLED: "false"
  REPUTATION_SUSPECT_THRESHOLD: "1.0"
  REPUTATION_QUARANTINE_THRESHOLD: "3.0"
  REPUTATION_COOLDOWN_SECONDS: "60"
  REPUTATION_DEDUPE_WINDOW_SECONDS: "10"
  REPUTATION_ORIGIN_EXEMPT_PEER_IDS: "origin"

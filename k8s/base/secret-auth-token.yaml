# Shared bearer token for campus peer auth (Workstream 2).
#
# DO NOT ship the placeholder value to production. Before rollout, replace
# each namespace's Secret with a real token:
#
#   TOKEN=$(openssl rand -base64 32)
#   kubectl create secret generic p2p-auth-token \
#     --namespace p2p-coordinator \
#     --from-literal=AUTH_TOKEN="$TOKEN" \
#     --dry-run=client -o yaml | kubectl apply -f -
#   kubectl create secret generic p2p-auth-token \
#     --namespace p2p-dht \
#     --from-literal=AUTH_TOKEN="$TOKEN" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# The placeholder lets the manifests apply cleanly in dev with AUTH_MODE=none,
# where the token is simply unused.
apiVersion: v1
kind: Secret
metadata:
  name: p2p-auth-token
  namespace: p2p-coordinator
type: Opaque
stringData:
  AUTH_TOKEN: "placeholder-dev-token-replace-before-rollout"
---
apiVersion: v1
kind: Secret
metadata:
  name: p2p-auth-token
  namespace: p2p-dht
type: Opaque
stringData:
  AUTH_TOKEN: "placeholder-dev-token-replace-before-rollout"

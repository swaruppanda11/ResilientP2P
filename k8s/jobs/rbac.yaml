  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: experiment-runner
  namespace: p2p-dht
subjects:
- kind: ServiceAccount
  name: experiment-runner
  namespace: p2p-dht
roleRef:
  kind: Role
  name: experiment-runner
  apiGroup: rbac.authorization.k8s.io

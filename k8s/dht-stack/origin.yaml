apiVersion: apps/v1
kind: Deployment
metadata:
  name: origin
  namespace: p2p-dht
spec:
  replicas: 1
  selector:
    matchLabels:
      app: origin
  template:
    metadata:
      labels:
        app: origin
    spec:
      nodeSelector:
        building: a
      containers:
      - name: origin
        image: us-central1-docker.pkg.dev/resilientp2p-492916/resilientp2p/origin:v1
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: p2p-common-config
        - secretRef:
            name: p2p-auth-token
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: origin
  namespace: p2p-dht
spec:
  selector:
    app: origin
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP

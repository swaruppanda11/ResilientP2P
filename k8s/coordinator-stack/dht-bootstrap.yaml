apiVersion: apps/v1
kind: Deployment
metadata:
  name: dht-bootstrap
  namespace: p2p-coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dht-bootstrap
  template:
    metadata:
      labels:
        app: dht-bootstrap
    spec:
      nodeSelector:
        building: A
      containers:
      - name: dht-bootstrap
        image: REGISTRY/dht-bootstrap:v1
        ports:
        - containerPort: 6000
          protocol: UDP
        env:
        - name: DHT_PORT
          value: "6000"
        - name: DHT_KSIZE
          value: "5"
        - name: DHT_ALPHA
          value: "3"
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
---
apiVersion: v1
kind: Service
metadata:
  name: dht-bootstrap
  namespace: p2p-coordinator
spec:
  selector:
    app: dht-bootstrap
  ports:
  - port: 6000
    targetPort: 6000
    protocol: UDP

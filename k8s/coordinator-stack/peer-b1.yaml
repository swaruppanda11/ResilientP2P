apiVersion: apps/v1
kind: Deployment
metadata:
  name: peer-b1
  namespace: p2p-coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: peer-b1
  template:
    metadata:
      labels:
        app: peer-b1
        building: B
    spec:
      nodeSelector:
        building: B
      containers:
      - name: peer
        image: REGISTRY/coord-peer:v1
        ports:
        - containerPort: 7000
          protocol: TCP
        - containerPort: 6000
          protocol: UDP
        envFrom:
        - configMapRef:
            name: p2p-common-config
        env:
        - name: PEER_ID
          value: "peer-b1"
        - name: LOCATION_ID
          value: "Building-B"
        - name: PEER_HOST
          value: "peer-b1.p2p-coordinator.svc.cluster.local"
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
        readinessProbe:
          httpGet:
            path: /health
            port: 7000
          initialDelaySeconds: 8
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 7000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: peer-b1
  namespace: p2p-coordinator
spec:
  selector:
    app: peer-b1
  ports:
  - name: http
    port: 7000
    targetPort: 7000
    protocol: TCP
  - name: dht
    port: 6000
    targetPort: 6000
    protocol: UDP
